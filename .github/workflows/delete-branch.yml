name: Delete Stale Branches

on:
  push:
    branches: [main]
    paths:
      - ".github/branches-to-delete.txt"

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete listed branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f .github/branches-to-delete.txt ]; then
            echo "No branches file. Exiting."
            exit 0
          fi
          while IFS= read -r branch || [ -n "$branch" ]; do
            [ -z "$branch" ] && continue
            case "$branch" in \#*) continue ;; esac
            echo "Attempting to delete branch: $branch"
            curl -sS -o /tmp/resp.json -w "HTTP %{http_code}\n" \
              -X DELETE \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/${branch}"
            cat /tmp/resp.json
            echo
          done < .github/branches-to-delete.txt
