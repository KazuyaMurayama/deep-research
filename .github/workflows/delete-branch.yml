name: Delete Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name to delete (without refs/heads/)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete branch via API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ inputs.branch }}"
          echo "Deleting branch: $BRANCH"
          curl -sS -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/${BRANCH}"
          echo "Branch delete request sent."
